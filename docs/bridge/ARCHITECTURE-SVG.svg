<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sovereign Gateway to SKAI architecture">
  <defs>
    <style>
      .bg { fill: #0f1724; }
      .cloud { fill: #e6f0ff; stroke: #2b6cb0; stroke-width:2; }
      .gateway { fill: #fff7ed; stroke: #d97706; stroke-width:2; }
      .edge { fill: #f0fff4; stroke: #16a34a; stroke-width:2; }
      .fallback { fill: #fff7f0; stroke: #ef4444; stroke-width:2; }
      .text-light { fill: #0b1220; font-family: Inter, Arial, sans-serif; font-size:14px; }
      .title { fill: #ffffff; font-family: Inter, Arial, sans-serif; font-size:16px; font-weight:700; }
      .connector { stroke: #9ca3af; stroke-width:2; stroke-dasharray: 0; }
      .label-box { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.08); }
      .badge { font-size:12px; font-weight:600; fill:#0b1220; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>

  <!-- Public Cloud -->
  <g transform="translate(60,40)">
    <rect class="cloud" x="0" y="0" rx="12" ry="12" width="320" height="120"/>
    <text class="title" x="20" y="28">Public Cloud</text>
    <text class="text-light" x="20" y="54">Azure IoT Hub</text>
    <text class="text-light" x="20" y="74">MQTT / HTTPS / AMQP</text>
  </g>

  <!-- Sovereign Gateway -->
  <g transform="translate(420,30)">
    <rect class="gateway" x="0" y="0" rx="12" ry="12" width="360" height="180"/>
    <text class="title" x="18" y="28">Sovereign Gateway</text>
    <text class="text-light" x="18" y="52">Gateway Adapter</text>
    <text class="text-light" x="18" y="72">- OPA Policy Gate</text>
    <text class="text-light" x="18" y="92">- Local KMS / HSM</text>
    <text class="text-light" x="18" y="112">- Aksara Artifact Creation</text>
    <rect class="label-box" x="18" y="122" width="320" height="36" rx="6" ry="6"/>
    <text class="badge" x="26" y="146">libp2p encrypted streams • DTN store-and-forward</text>
  </g>

  <!-- Connectors Cloud -> Gateway -->
  <line class="connector" x1="380" y1="100" x2="420" y2="100" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>
  <text class="text-light" x="300" y="90">MQTT / HTTPS / AMQP</text>

  <!-- SKAI Edge Cluster -->
  <g transform="translate(120,260)">
    <rect class="edge" x="0" y="0" rx="10" ry="10" width="320" height="160"/>
    <text class="title" x="18" y="28">SKAI Edge Node Cluster</text>
    <text class="text-light" x="18" y="52">CRDT store • Local compute</text>
    <text class="text-light" x="18" y="72">Merkle reconciliation</text>
  </g>

  <!-- SKAI Edge Node -->
  <g transform="translate(480,260)">
    <rect class="edge" x="0" y="0" rx="10" ry="10" width="220" height="120"/>
    <text class="title" x="12" y="26">SKAI Edge Node</text>
    <text class="text-light" x="12" y="50">Raft control for critical state</text>
    <text class="text-light" x="12" y="70">Local rendering of Aksara</text>
  </g>

  <!-- Fallback comms -->
  <g transform="translate(760,260)">
    <rect class="fallback" x="0" y="0" rx="10" ry="10" width="320" height="160"/>
    <text class="title" x="18" y="28">Fallback Communications</text>
    <text class="text-light" x="18" y="52">Cellular multi-SIM • Satellite</text>
    <text class="text-light" x="18" y="72">LoRa for critical low-bandwidth</text>
  </g>

  <!-- Connectors Gateway -> Edge -->
  <line class="connector" x1="600" y1="160" x2="600" y2="260" stroke="#60a5fa" stroke-width="3"/>
  <line class="connector" x1="600" y1="210" x2="320" y2="320" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6 4"/>
  <line class="connector" x1="780" y1="210" x2="760" y2="320" stroke="#fca5a5" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Governance badges -->
  <g transform="translate(420,220)">
    <rect x="0" y="0" width="360" height="28" rx="6" ry="6" fill="#111827" opacity="0.6"/>
    <text class="text-light" x="12" y="18">Governance • Local KMS/HSM • OPA Policy Gate • Ethics Board Hook</text>
  </g>

  <!-- Footer notes -->
  <g transform="translate(40,460)">
    <text class="text-light" x="0" y="18">Key</text>
    <rect x="40" y="4" width="18" height="12" fill="#e6f0ff" stroke="#2b6cb0"/>
    <text class="text-light" x="66" y="14">Public Cloud</text>

    <rect x="220" y="4" width="18" height="12" fill="#fff7ed" stroke="#d97706"/>
    <text class="text-light" x="246" y="14">Sovereign Gateway</text>

    <rect x="460" y="4" width="18" height="12" fill="#f0fff4" stroke="#16a34a"/>
    <text class="text-light" x="486" y="14">SKAI Edge</text>

    <rect x="660" y="4" width="18" height="12" fill="#fff7f0" stroke="#ef4444"/>
    <text class="text-light" x="686" y="14">Fallback comms</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b6cb0"/>
    </marker>
  </defs>
</svg>
